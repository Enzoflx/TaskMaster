<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasksMaster - Contacto</title>
    <link rel="stylesheet" href="../css/comun.css">
    <link rel="stylesheet" href="../css/app.css">
</head>

<body class="dashboard-body">
    <header class="cabecera">
        <a href="../index.html" class="cabecera-logo">TasksMaster</a>
        <nav class="cabecera-nav">
            <a href="panel.html">Tareas</a>
            <a href="contacto.html" class="activo">Contacto</a>
            <a href="login.html">Salir</a>
        </nav>
    </header>
    <div class="zona-central">
        <aside class="barra-lateral">
            <nav class="menu-lateral">
                <div class="titulo-seccion-nav">Menu</div>
                <a href="panel.html" class="enlace-menu">Tareas</a>
                <a href="editar.html" class="enlace-menu">Nueva tarea</a>
                <a href="contacto.html" class="enlace-menu activo">Contacto</a>
            </nav>
            <div class="sesion-activa">
                <div class="sesion-usuario-info">
                    <div class="avatar-usuario">EB</div>
                    <div>
                        <div class="nombre-sesion">Enzo Berzosa</div>
                        <div class="email-sesion">enzbermar@alu.edu.gva.es</div>
                    </div>
                </div>
                <a href="login.html" class="boton-cerrar-sesion">Cerrar sesión</a>
            </div>
        </aside>
        <main class="contenido-principal">
            <div class="cuerpo-pagina">
                <div class="barra-acciones">
                    <span class="titulo-seccion">Formulario de contacto</span>
                </div>
                <div class="tarjeta-contacto">
                    <p class="descripcion-contacto">Usa este formulario para ponerte en contacto con el equipo de
                        TasksMaster.</p>
                    <form action="#" method="post" id="formulario-contacto">
                        <div class="cuadricula-campos">
                            <div class="grupo-campo">
                                <label for="contacto-nombre">Nombre <span class="obligatorio">*</span></label>
                                <input type="text" id="contacto-nombre" name="nombre" placeholder="Enzo Berzosa" required>
                            </div>
                            <div class="grupo-campo">
                                <label for="contacto-correo">Correo electrónico <span
                                        class="obligatorio">*</span></label>
                                <input type="email" id="contacto-correo" name="correo" placeholder="enzbermar@alu.edu.gva.es" required>
                            </div>
                            <div class="grupo-campo campo-completo">
                                <label for="contacto-asunto">Asunto <span class="obligatorio">*</span></label>
                                <input type="text" id="contacto-asunto" name="asunto" placeholder="Motivo del mensaje"
                                    required>
                            </div>
                            <div class="grupo-campo campo-completo">
                                <label for="contacto-mensaje">Mensaje <span class="obligatorio">*</span></label>
                                <textarea id="contacto-mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..."
                                    required></textarea>
                            </div>
                        </div>
                        <div class="acciones-formulario">
                            <button type="submit" class="boton boton-primario" id="boton-enviar-contacto">Enviar
                                mensaje</button>
                            <a href="panel.html" class="boton boton-secundario">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <footer class="pie-pagina">
        &copy; 2026 &middot; TasksMaster
    </footer>
</body>

</html>
