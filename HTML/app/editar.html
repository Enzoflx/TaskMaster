<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasksMaster - Editar Tarea</title>
    <link rel="stylesheet" href="../css/comun.css">
    <link rel="stylesheet" href="../css/app.css">
</head>

<body class="dashboard-body">
    <header class="cabecera">
        <a href="../index.html" class="cabecera-logo">TasksMaster</a>
        <nav class="cabecera-nav">
            <a href="panel.html">Tareas</a>
            <a href="editar.html" class="activo">Editar tarea</a>
            <a href="login.html">Salir</a>
        </nav>
    </header>
    <div class="zona-central">
        <aside class="barra-lateral">
            <nav class="menu-lateral">
                <div class="titulo-seccion-nav">Menu</div>
                <a href="panel.html" class="enlace-menu">Tareas</a>
                <a href="editar.html" class="enlace-menu activo">Nueva tarea</a>
                <a href="contacto.html" class="enlace-menu">Contacto</a>
            </nav>
            <div class="sesion-activa">
                <div class="sesion-usuario-info">
                    <div class="avatar-usuario">EB</div>
                    <div>
                        <div class="nombre-sesion">Enzo Berzosa</div>
                        <div class="email-sesion">enzbermar@alu.edu.gva.es</div>
                    </div>
                </div>
                <a href="login.html" class="boton-cerrar-sesion">Cerrar sesión</a>
            </div>
        </aside>
        <main class="contenido-principal">
            <div class="cuerpo-pagina">
                <div class="barra-acciones">
                    <nav class="migas-pan">
                        <a href="panel.html">Tareas</a> &rsaquo; Editar tarea
                    </nav>
                    <a href="panel.html" class="boton boton-secundario">Volver al listado</a>
                </div>
                <div class="tarjeta-formulario">
                    <form action="#" method="post" id="formulario-tarea">
                        <div class="cuadricula-campos">
                            <div class="grupo-campo campo-completo">
                                <label for="titulo">Título <span class="obligatorio">*</span></label>
                                <input type="text" id="titulo" name="titulo"
                                    placeholder="Ej: Preparar informe trimestral" required maxlength="255">
                            </div>
                            <div class="grupo-campo campo-completo">
                                <label for="descripcion">Descripción</label>
                                <textarea id="descripcion" name="descripcion"
                                    placeholder="Describe la tarea en detalle..."></textarea>
                            </div>
                            <div class="grupo-campo">
                                <label for="estado">Estado <span class="obligatorio">*</span></label>
                                <select id="estado" name="estado_id" required>
                                    <option value="" disabled selected>Selecciona un estado</option>
                                    <option value="1">Pendiente</option>
                                    <option value="2">En Progreso</option>
                                    <option value="3">Completada</option>
                                    <option value="4">Cancelada</option>
                                </select>
                            </div>
                            <div class="grupo-campo">
                                <label for="categoria">Categoría <span class="obligatorio">*</span></label>
                                <select id="categoria" name="categoria_id" required>
                                    <option value="" disabled selected>Selecciona una categoría</option>
                                    <option value="1">Trabajo</option>
                                    <option value="2">Hogar</option>
                                    <option value="3">Desarrollo Personal</option>
                                    <option value="4">Finanzas</option>
                                </select>
                            </div>
                            <div class="grupo-campo">
                                <label for="fecha-limite">Fecha límite</label>
                                <input type="datetime-local" id="fecha-limite" name="fecha_limite">
                            </div>
                            <div class="grupo-campo campo-completo">
                                <label for="observaciones">Observaciones</label>
                                <textarea id="observaciones" name="observaciones"
                                    placeholder="Notas adicionales..."></textarea>
                            </div>
                        </div>
                        <div class="acciones-formulario">
                            <button type="submit" class="boton boton-primario">Guardar</button>
                            <a href="panel.html" class="boton boton-secundario">Cancelar</a>
                            <button type="button" class="boton boton-peligro">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <footer class="pie-pagina">
        &copy; 2026 &middot; TasksMaster
    </footer>
</body>

</html>
